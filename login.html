<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vent - Login</title>

    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="container">

    <div class="login-box">

        <h1>Vent Account</h1>

        <p>Login to continue.</p>

        <form id="loginForm">

            <label>Email</label>
            <input
                type="email"
                id="loginEmail"
                placeholder="Enter your email"
                required
            >

            <label>Password</label>
            <input
                type="password"
                id="loginPassword"
                placeholder="Enter your password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <div class="links">

            <a href="signup.html">
                Create Vent Account
            </a>

            <br><br>

            <a href="index.html">
                ← Back to Home
            </a>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
