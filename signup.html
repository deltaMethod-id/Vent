<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vent - Sign Up</title>

    <link rel="stylesheet" href="signup.css">
</head>
<body>

<div class="container">

    <div class="signup-box">

        <h1>Create Vent Account</h1>

        <p>Create your account to start sharing your thoughts.</p>

        <form id="signupForm">

            <label>Username</label>
            <input
                type="text"
                id="signupUsername"
                placeholder="Enter your username"
                required
            >

            <label>Email</label>
            <input
                type="email"
                id="signupEmail"
                placeholder="Enter your email"
                required
            >

            <label>Password</label>
            <input
                type="password"
                id="signupPassword"
                placeholder="Create a password"
                required
            >

            <label>Confirm Password</label>
            <input
                type="password"
                id="signupConfirmPassword"
                placeholder="Confirm your password"
                required
            >

            <button type="submit">
                Create Account
            </button>

        </form>

        <div class="links">

            <a href="login.html">
                Already have a Vent Account? Login
            </a>

            <br><br>

            <a href="index.html">
                ← Back to Home
            </a>

        </div>

    </div>

</div>

<script src="signup.js"></script>

</body>
</html>
