<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vent - Settings</title>

    <link rel="stylesheet" href="settings.css">
</head>
<body>

<header>

    <h1>Settings</h1>

    <nav>
        <a href="app.html">Home</a>
        <a href="settings.html">Settings</a>
    </nav>

</header>

<main>

    <section class="profile-card">

        <h2>Vent Account</h2>

        <p><strong>Username</strong></p>
        <input
            type="text"
            id="newUsername"
            placeholder="New Username"
        >

        <button id="changeUsernameBtn">
            Change Username
        </button>

        <br><br>

        <p><strong>Password</strong></p>

        <input
            type="password"
            id="currentPassword"
            placeholder="Current Password"
        >

        <input
            type="password"
            id="newPassword"
            placeholder="New Password"
        >

        <button id="changePasswordBtn">
            Change Password
        </button>

    </section>

    <section class="account-card">

        <h2>Account</h2>

        <button id="logoutBtn">
            Logout
        </button>

        <button id="deleteAccountBtn" class="danger">
            Delete Account
        </button>

    </section>

</main>

<footer>

    <p>© 2026 Vent</p>

</footer>

<script src="settings.js"></script>

</body>
</html>
